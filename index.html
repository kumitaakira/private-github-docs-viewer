<!DOCTYPE html>
<html lang="ja" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Docs Viewer</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // classによるダークモード制御を有効化
            theme: {
                extend: {
                    colors: {
                        dracula: {
                            bg: '#282a36',
                            sidebar: '#21222c',
                            current: '#44475a',
                            fg: '#f8f8f2',
                            comment: '#6272a4',
                            cyan: '#8be9fd',
                            green: '#50fa7b',
                            orange: '#ffb86c',
                            pink: '#ff79c6',
                            purple: '#bd93f9',
                            red: '#ff5555',
                            yellow: '#f1fa8c'
                        }
                    }
                }
            }
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-texmath@1.0.0/texmath.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..24,400..600,0..1,0">
    <link id="hl-style" rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/dracula.min.css">
    <link id="md-style" rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown-dark.min.css">

    <style>
        ::-webkit-scrollbar {
            display: none;
        }

        * {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        details>summary {
            list-style: none;
        }

        details>summary::-webkit-details-marker {
            display: none;
        }

        #pdf-pages-wrapper {
            transition: width 0.2s ease-out;
        }

        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 20px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-flex;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
            font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 20;
        }

        .icon-btn {
            width: 2.25rem;
            height: 2.25rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.5rem;
        }

        .tree-list {
            position: relative;
        }

        .tree-list.nested {
            margin: 0.25rem 0 0.25rem 1rem;
            padding-left: 0.75rem;
            border-left: 1px solid rgb(209 213 219 / 0.8);
        }

        .dark .tree-list.nested {
            border-left-color: rgb(68 71 90 / 0.9);
        }

        .tree-row {
            min-height: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-radius: 0.5rem;
            padding: 0.35rem 0.5rem;
            transition: background-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
        }

        .tree-row:hover {
            background: rgb(243 244 246);
        }

        .dark .tree-row:hover {
            background: rgb(68 71 90 / 0.75);
        }

        .tree-row.active {
            background: rgb(219 234 254);
            color: rgb(29 78 216);
            box-shadow: inset 3px 0 0 rgb(37 99 235);
        }

        .dark .tree-row.active {
            background: rgb(68 71 90);
            color: #8be9fd;
            box-shadow: inset 3px 0 0 #8be9fd;
        }

        .tree-chevron {
            font-size: 18px;
            color: rgb(107 114 128);
            transition: transform 0.15s ease;
        }

        .dark .tree-chevron {
            color: #6272a4;
        }

        details[open]>summary .tree-chevron {
            transform: rotate(90deg);
        }

        .tree-file-icon,
        .tree-folder-icon {
            font-size: 20px;
            flex: 0 0 auto;
        }

        .tree-folder-icon {
            color: rgb(234 179 8);
        }

        .tree-file-icon.pdf {
            color: rgb(239 68 68);
        }

        .tree-file-icon.md {
            color: rgb(37 99 235);
        }

        .dark .tree-folder-icon {
            color: #f1fa8c;
        }

        .dark .tree-file-icon.pdf {
            color: #ff5555;
        }

        .dark .tree-file-icon.md {
            color: #8be9fd;
        }

        .search-clear-btn {
            position: absolute;
            top: 50%;
            right: 0.5rem;
            width: 2rem;
            height: 2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.375rem;
            transform: translateY(-50%);
        }

        .search-clear-btn .material-symbols-outlined {
            display: block;
            font-size: 20px;
            line-height: 1;
        }

        .segmented-control {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.25rem;
            padding: 0.25rem;
            border-radius: 0.5rem;
            background: rgb(243 244 246);
            border: 1px solid rgb(229 231 235);
        }

        .dark .segmented-control {
            background: #282a36;
            border-color: #44475a;
        }

        .search-mode-btn {
            min-height: 1.75rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            color: rgb(75 85 99);
            transition: background-color 0.15s ease, color 0.15s ease;
        }

        .dark .search-mode-btn {
            color: #6272a4;
        }

        .search-mode-btn.active {
            background: white;
            color: rgb(37 99 235);
            box-shadow: 0 1px 2px rgb(0 0 0 / 0.08);
        }

        .dark .search-mode-btn.active {
            background: #44475a;
            color: #8be9fd;
        }

        .search-result-row {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            border-radius: 0.5rem;
            padding: 0.5rem;
            text-align: left;
            width: 100%;
            transition: background-color 0.15s ease;
        }

        .search-result-row:hover {
            background: rgb(243 244 246);
        }

        .dark .search-result-row:hover {
            background: rgb(68 71 90 / 0.75);
        }

        .search-highlight {
            background: rgb(254 240 138);
            color: rgb(113 63 18);
            border-radius: 0.2rem;
            padding: 0 0.1rem;
        }

        #scroll-container,
        #pdf-wrapper {
            overscroll-behavior: contain;
            touch-action: pan-x pan-y;
        }

        .dark .search-highlight {
            background: #f1fa8c;
            color: #21222c;
        }

        .shortcut-kbd {
            min-width: 2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.375rem;
            border: 1px solid rgb(209 213 219);
            background: rgb(249 250 251);
            padding: 0.125rem 0.375rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            font-size: 0.75rem;
            color: rgb(55 65 81);
        }

        .dark .shortcut-kbd {
            border-color: #44475a;
            background: #282a36;
            color: #f8f8f2;
        }

        /* Markdown 背景の透過化 (Light/Dark共通) */
        .markdown-body {
            background-color: transparent !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        .markdown-body ul,
        .markdown-body ol {
            padding-left: 2em;
        }

        .markdown-body ul {
            list-style-type: disc;
        }

        .markdown-body ol {
            list-style-type: decimal;
        }

        .markdown-body ul ul {
            list-style-type: circle;
        }

        .markdown-body ul ul ul {
            list-style-type: square;
        }

        .markdown-body li {
            display: list-item;
        }

        .markdown-body .task-list-item {
            list-style-type: none;
        }

        .markdown-body .task-list-item-checkbox {
            margin: 0 0.45em 0.2em -1.4em;
            vertical-align: middle;
            accent-color: #2563eb;
        }

        .dark .markdown-body .task-list-item-checkbox {
            accent-color: #bd93f9;
        }

        /* KaTeX ベーススタイル */
        .katex {
            font-size: 1.15em;
        }

        .katex-display {
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 0.5em;
        }

        .dark .katex {
            color: #f8f8f2;
        }

        .dark .markdown-body .katex,
        .dark .markdown-body .katex * {
            color: #f8f8f2 !important;
        }

        .dark .markdown-body .katex .frac-line,
        .dark .markdown-body .katex .sqrt > .root,
        .dark .markdown-body .katex .sqrt > .sqrt-line,
        .dark .markdown-body .katex .overline .overline-line,
        .dark .markdown-body .katex .underline .underline-line,
        .dark .markdown-body .katex .rule {
            border-color: currentColor !important;
        }

        .dark .markdown-body .katex-display {
            background: rgb(68 71 90 / 0.32);
            border: 1px solid rgb(98 114 164 / 0.34);
            border-radius: 0.375rem;
            padding: 0.75rem 0.875rem;
        }

        :not(.dark) .katex {
            color: #1f2937;
        }

        /* Dracula専用 Markdown カスタム (ダークモード時のみ適用) */
        .dark .markdown-body {
            color: #f8f8f2;
        }

        .dark .markdown-body h1,
        .dark .markdown-body h2,
        .dark .markdown-body h3,
        .dark .markdown-body h4,
        .dark .markdown-body h5,
        .dark .markdown-body h6 {
            color: #bd93f9;
            border-bottom-color: #44475a;
        }

        .dark .markdown-body a {
            color: #8be9fd;
        }

        .dark .markdown-body blockquote {
            color: #f1fa8c;
            border-left-color: #bd93f9;
        }

        .dark .markdown-body code {
            background-color: #44475a;
            color: #ff79c6;
        }

        .dark .markdown-body pre {
            background-color: #21222c !important;
            border: 1px solid #44475a;
        }

        .dark .markdown-body table tr {
            background-color: #282a36;
            border-top-color: #44475a;
        }

        .dark .markdown-body table tr:nth-child(2n) {
            background-color: #21222c;
        }

        .dark .markdown-body table th,
        .dark .markdown-body table td {
            border-color: #44475a;
        }

        .dark .markdown-body hr {
            background-color: #44475a;
        }
    </style>
</head>

<body
    class="bg-gray-50 dark:bg-dracula-bg text-gray-900 dark:text-dracula-fg font-sans h-[100dvh] flex flex-col overflow-hidden selection:bg-blue-200 dark:selection:bg-dracula-current selection:text-blue-900 dark:selection:text-dracula-cyan transition-colors">

    <div id="loading"
        class="hidden absolute inset-0 bg-white dark:bg-dracula-bg bg-opacity-80 dark:bg-opacity-80 z-[100] flex justify-center items-center">
        <div class="flex flex-col items-center gap-3">
            <div
                class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-600 dark:border-dracula-purple">
            </div>
            <button id="cancel-loading-btn"
                class="text-xs text-gray-500 hover:text-gray-800 dark:text-dracula-comment dark:hover:text-dracula-fg transition-colors px-3 py-1 rounded">
                キャンセル
            </button>
        </div>
    </div>

    <div id="login-view"
        class="flex flex-col h-full justify-center max-w-md mx-auto w-full overflow-y-auto p-4 z-50 bg-gray-50 dark:bg-dracula-bg absolute inset-0 transition-colors">
        <div
            class="bg-white dark:bg-dracula-sidebar p-6 rounded-lg shadow-xl dark:shadow-2xl border border-gray-200 dark:border-dracula-current">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800 dark:text-dracula-purple">リポジトリ設定</h2>
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-sm text-gray-600 dark:text-dracula-comment mb-1">対象リポジトリ <span
                            class="text-red-500 dark:text-dracula-red">*</span></label>
                    <input type="text" id="repo-input" placeholder="例: user/repo"
                        class="w-full p-3 rounded bg-gray-50 dark:bg-dracula-bg border border-gray-300 dark:border-dracula-current text-gray-900 dark:text-dracula-fg focus:outline-none focus:border-blue-500 dark:focus:border-dracula-pink font-mono text-sm transition-colors">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 dark:text-dracula-comment mb-1">ルートパス (省略可)</label>
                    <input type="text" id="path-input" placeholder="例: docs"
                        class="w-full p-3 rounded bg-gray-50 dark:bg-dracula-bg border border-gray-300 dark:border-dracula-current text-gray-900 dark:text-dracula-fg focus:outline-none focus:border-blue-500 dark:focus:border-dracula-pink font-mono text-sm transition-colors">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 dark:text-dracula-comment mb-1">Personal Access Token
                        <span class="text-red-500 dark:text-dracula-red">*</span></label>
                    <input type="password" id="token-input" placeholder="github_pat_..."
                        class="w-full p-3 rounded bg-gray-50 dark:bg-dracula-bg border border-gray-300 dark:border-dracula-current text-gray-900 dark:text-dracula-fg focus:outline-none focus:border-blue-500 dark:focus:border-dracula-pink font-mono text-sm transition-colors">
                </div>
            </div>
            <button id="login-btn"
                class="w-full bg-blue-600 hover:bg-blue-700 dark:bg-dracula-purple dark:hover:bg-[#a67cf3] text-white dark:text-dracula-bg font-bold py-3 px-4 rounded transition duration-200 shadow">
                ビューアーを起動
            </button>
            <p id="login-error" class="text-red-500 dark:text-dracula-red text-sm mt-3 hidden text-center"></p>
        </div>
    </div>

    <div id="workspace-view" class="hidden flex-col h-full w-full relative">

        <header
            class="bg-white dark:bg-dracula-sidebar p-3 shadow-sm dark:shadow-md flex justify-between items-center shrink-0 border-b border-gray-200 dark:border-dracula-current z-20 transition-colors">
            <div class="flex items-center">
                <button id="menu-btn"
                    class="icon-btn text-gray-500 hover:text-gray-900 hover:bg-gray-100 dark:text-dracula-comment dark:hover:text-dracula-fg dark:hover:bg-dracula-current mr-2 focus:outline-none transition-colors"
                    title="メニュー">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <h1 class="text-lg font-bold truncate max-w-[150px] sm:max-w-[200px] text-gray-800 dark:text-dracula-purple"
                    id="header-title">Docs Viewer</h1>
            </div>

            <div class="flex items-center space-x-2 sm:space-x-3">
                <button id="focus-search-btn"
                    class="icon-btn text-gray-600 hover:text-gray-900 hover:bg-gray-100 dark:text-dracula-comment dark:hover:text-dracula-fg dark:hover:bg-dracula-current transition-colors"
                    title="検索">
                    <span class="material-symbols-outlined">search</span>
                </button>
                <button id="shortcuts-btn"
                    class="icon-btn text-gray-600 hover:text-gray-900 hover:bg-gray-100 dark:text-dracula-comment dark:hover:text-dracula-fg dark:hover:bg-dracula-current transition-colors"
                    title="ショートカット">
                    <span class="material-symbols-outlined">keyboard_command_key</span>
                </button>
                <button id="theme-toggle-btn"
                    class="icon-btn text-gray-600 hover:text-gray-900 hover:bg-gray-100 dark:text-dracula-comment dark:hover:text-dracula-fg dark:hover:bg-dracula-current transition-colors"
                    title="テーマ切り替え">
                    <span class="material-symbols-outlined" id="theme-toggle-icon">dark_mode</span>
                </button>

                <div id="zoom-controls"
                    class="hidden flex items-center space-x-1 bg-gray-100 dark:bg-dracula-bg rounded border border-gray-200 dark:border-dracula-current p-1 transition-colors">
                    <button id="zoom-out-btn"
                        class="text-gray-600 hover:bg-gray-200 hover:text-gray-900 dark:text-dracula-comment dark:hover:bg-dracula-current dark:hover:text-dracula-fg px-2 rounded transition-colors">-</button>
                    <span id="zoom-level"
                        class="text-xs text-gray-700 dark:text-dracula-fg w-10 text-center cursor-pointer font-mono">100%</span>
                    <button id="zoom-in-btn"
                        class="text-gray-600 hover:bg-gray-200 hover:text-gray-900 dark:text-dracula-comment dark:hover:bg-dracula-current dark:hover:text-dracula-fg px-2 rounded transition-colors">+</button>
                </div>

                <button id="logout-btn"
                    class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 hover:text-gray-900 dark:bg-dracula-bg dark:hover:bg-dracula-current dark:text-dracula-comment dark:hover:text-dracula-fg py-1.5 px-3 rounded border border-gray-200 dark:border-dracula-current transition-colors">設定</button>
            </div>
        </header>

        <div
            class="flex-grow relative flex overflow-hidden bg-gray-50 dark:bg-dracula-bg w-full h-full transition-colors">

            <div id="sidebar-overlay"
                class="absolute inset-0 bg-black bg-opacity-40 dark:bg-opacity-60 z-30 hidden transition-opacity"></div>

            <aside id="sidebar"
                class="absolute inset-y-0 left-0 w-72 bg-white dark:bg-dracula-sidebar border-r border-gray-200 dark:border-dracula-current transform -translate-x-full transition-transform duration-300 z-40 flex flex-col shadow-xl dark:shadow-2xl h-full">
                <div
                    class="p-3 border-b border-gray-200 dark:border-dracula-current bg-white dark:bg-dracula-sidebar shrink-0 space-y-3 transition-colors">
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-dracula-comment text-[18px]">search</span>
                        <input id="search-input" type="text" placeholder="検索"
                            class="w-full pl-9 pr-11 py-2 rounded bg-gray-50 dark:bg-dracula-bg border border-gray-200 dark:border-dracula-current text-gray-900 dark:text-dracula-fg focus:outline-none focus:border-blue-500 dark:focus:border-dracula-cyan text-sm transition-colors">
                        <button id="clear-search-btn"
                            class="hidden search-clear-btn text-gray-400 hover:text-gray-700 dark:text-dracula-comment dark:hover:text-dracula-fg"
                            title="検索をクリア">
                            <span class="material-symbols-outlined">close</span>
                        </button>
                    </div>
                    <div class="segmented-control">
                        <button class="search-mode-btn active" data-search-mode="file">ファイル</button>
                        <button class="search-mode-btn" data-search-mode="content">本文</button>
                        <button class="search-mode-btn" data-search-mode="current">現在</button>
                    </div>
                    <p id="search-status" class="text-[11px] text-gray-500 dark:text-dracula-comment min-h-[1rem]"></p>
                    <div id="search-results" class="hidden max-h-72 overflow-y-auto space-y-1"></div>
                </div>
                <div class="flex-grow overflow-y-auto p-2 text-sm pb-10" id="tree-root"></div>
            </aside>

            <div id="scroll-container" class="flex-grow overflow-auto w-full h-full relative"
                style="-webkit-overflow-scrolling: touch;">
                <div id="current-search-bar"
                    class="hidden sticky top-0 z-10 bg-white/95 dark:bg-dracula-sidebar/95 backdrop-blur border-b border-gray-200 dark:border-dracula-current px-3 py-2 transition-colors">
                    <div class="max-w-4xl mx-auto flex items-center gap-2">
                        <span class="material-symbols-outlined text-gray-400 dark:text-dracula-comment">find_in_page</span>
                        <input id="current-search-input" type="text" placeholder="現在のファイル内を検索"
                            class="min-w-0 flex-1 py-1.5 px-2 rounded bg-gray-50 dark:bg-dracula-bg border border-gray-200 dark:border-dracula-current text-gray-900 dark:text-dracula-fg focus:outline-none focus:border-blue-500 dark:focus:border-dracula-cyan text-sm transition-colors">
                        <span id="current-search-count"
                            class="text-xs text-gray-500 dark:text-dracula-comment tabular-nums min-w-[3.5rem] text-right">0/0</span>
                        <button id="current-prev-btn" class="icon-btn text-gray-500 hover:bg-gray-100 hover:text-gray-900 dark:text-dracula-comment dark:hover:bg-dracula-current dark:hover:text-dracula-fg disabled:opacity-40"
                            title="前の一致">
                            <span class="material-symbols-outlined">keyboard_arrow_up</span>
                        </button>
                        <button id="current-next-btn" class="icon-btn text-gray-500 hover:bg-gray-100 hover:text-gray-900 dark:text-dracula-comment dark:hover:bg-dracula-current dark:hover:text-dracula-fg disabled:opacity-40"
                            title="次の一致">
                            <span class="material-symbols-outlined">keyboard_arrow_down</span>
                        </button>
                    </div>
                </div>

                <div id="empty-state"
                    class="absolute inset-0 flex items-center justify-center text-gray-400 dark:text-dracula-comment flex-col h-full pointer-events-none">
                    <p class="text-sm">左上のメニューからファイルを選択してください</p>
                </div>

                <div id="pdf-wrapper" class="hidden flex-col items-center py-4 space-y-3 mx-auto"
                    style="width: 100%; max-width: 800px;"></div>

                <div id="md-wrapper" class="hidden markdown-body p-6 mx-auto w-full max-w-4xl pb-20"></div>

            </div>
        </div>
    </div>

    <div id="shortcuts-modal"
        class="hidden fixed inset-0 z-[120] bg-black/45 dark:bg-black/60 items-center justify-center p-4">
        <div
            class="w-full max-w-lg bg-white dark:bg-dracula-sidebar border border-gray-200 dark:border-dracula-current rounded-lg shadow-2xl overflow-hidden">
            <div
                class="flex items-center justify-between px-4 py-3 border-b border-gray-200 dark:border-dracula-current">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-blue-600 dark:text-dracula-cyan">keyboard</span>
                    <h2 class="font-semibold text-gray-800 dark:text-dracula-fg">ショートカット</h2>
                </div>
                <button id="close-shortcuts-btn"
                    class="icon-btn text-gray-400 hover:text-gray-700 hover:bg-gray-100 dark:text-dracula-comment dark:hover:text-dracula-fg dark:hover:bg-dracula-current"
                    title="閉じる">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="p-4 space-y-3 text-sm">
                <div class="flex items-center justify-between gap-4">
                    <span>ショートカット一覧</span>
                    <span><kbd class="shortcut-kbd">⌘</kbd> <kbd class="shortcut-kbd">/</kbd></span>
                </div>
                <div class="flex items-center justify-between gap-4">
                    <span>検索へ移動</span>
                    <span><kbd class="shortcut-kbd">⌘</kbd> <kbd class="shortcut-kbd">K</kbd></span>
                </div>
                <div class="flex items-center justify-between gap-4">
                    <span>現在のファイル内検索</span>
                    <span><kbd class="shortcut-kbd">⌘</kbd> <kbd class="shortcut-kbd">F</kbd></span>
                </div>
                <div class="flex items-center justify-between gap-4">
                    <span>サイドバー表示切替</span>
                    <span><kbd class="shortcut-kbd">⌘</kbd> <kbd class="shortcut-kbd">B</kbd></span>
                </div>
                <div class="flex items-center justify-between gap-4">
                    <span>テーマ切り替え</span>
                    <span><kbd class="shortcut-kbd">⌘</kbd> <kbd class="shortcut-kbd">⇧</kbd> <kbd class="shortcut-kbd">L</kbd></span>
                </div>
                <div class="flex items-center justify-between gap-4">
                    <span>PDF拡大/縮小</span>
                    <span><kbd class="shortcut-kbd">⌘</kbd> <kbd class="shortcut-kbd">+</kbd> / <kbd class="shortcut-kbd">-</kbd></span>
                </div>
                <div class="flex items-center justify-between gap-4">
                    <span>閉じる/読み込みキャンセル</span>
                    <span><kbd class="shortcut-kbd">Esc</kbd></span>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
