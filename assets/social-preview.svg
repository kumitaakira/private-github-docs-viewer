<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Private Docs Viewer</title>
  <desc id="desc">Private GitHub documentation, easy to browse</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#21222c"/>
      <stop offset="1" stop-color="#282a36"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g transform="translate(170 315)">
    <circle r="132" fill="none" stroke="#2563eb" stroke-opacity=".4" stroke-width="10"/>
    <circle r="66" fill="none" stroke="#bd93f9" stroke-opacity=".55" stroke-width="10"/>
    <circle cx="108" cy="-76" r="23" fill="#2563eb"/>
    <circle cx="14" cy="132" r="23" fill="#8b5cf6"/>
    <circle cx="-128" cy="-28" r="23" fill="#bd93f9" fill-opacity=".7"/>
  </g>
  <text x="370" y="285" fill="#f8f8f2" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="66" font-weight="700">Private Docs Viewer</text>
  <text x="374" y="355" fill="#8be9fd" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30">Private GitHub documentation, easy to browse.</text>
</svg>
